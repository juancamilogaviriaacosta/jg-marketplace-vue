services:
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: jgmarketplacespring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: jg-marketplace
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      PGDATABASE: jgmarketplacespring
      PGHOST: db
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: 123456